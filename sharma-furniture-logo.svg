<svg width="920" height="280" viewBox="0 0 920 280" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">Sharma Furniture House and Workshop logo</title>
  <desc id="logoDesc">Premium RGB-gradient logo with workshop tools for Sharma Furniture House and Workshop.</desc>
  <defs>
